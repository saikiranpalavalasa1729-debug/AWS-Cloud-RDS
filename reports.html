<!DOCTYPE html>
<html>

<head>

    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet"
          href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">

            Cloud RDS System

        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-outline-light">

                Dashboard

            </a>

            <a href="/employees"
               class="btn btn-outline-light">

                Employees

            </a>

            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">

        Analytics Report

    </h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card shadow p-4 text-center">

                <h5>Total Employees</h5>

                <h2>{{total_employees}}</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow p-4 text-center">

                <h5>Total Salary</h5>

                <h2>₹{{total_salary}}</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow p-4 text-center">

                <h5>Average Salary</h5>

                <h2>₹{{average_salary}}</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow p-4 text-center">

                <h5>Departments</h5>

                <h2>{{departments}}</h2>

            </div>

        </div>

    </div>

    <div class="card mt-5 shadow p-4">

        <h4 class="mb-3">

            Employee Analytics

        </h4>

        <canvas id="employeeChart"></canvas>

    </div>

</div>

<script>

const ctx = document.getElementById(
    'employeeChart'
);

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [
            'Employees',
            'Departments'
        ],

        datasets: [{

            label: 'Cloud Database Report',

            data: [
                {{total_employees}},
                {{departments}}
            ]

        }]
    }

});

</script>

</body>

</html>
