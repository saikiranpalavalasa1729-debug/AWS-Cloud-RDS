<!DOCTYPE html>
<html>

<head>

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">

            Cloud RDS System

        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-outline-light">

                Dashboard

            </a>

            <a href="/employees"
               class="btn btn-outline-light">

                Employees

            </a>

            <a href="/reports"
               class="btn btn-outline-light">

                Reports

            </a>

            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2>Edit Employee</h2>

                <form action="/update/{{employee.id}}"
                      method="POST">

                    <div class="mb-3">

                        <label>Name</label>

                        <input type="text"
                               name="name"
                               value="{{employee.name}}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input type="email"
                               name="email"
                               value="{{employee.email}}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Department</label>

                        <input type="text"
                               name="department"
                               value="{{employee.department}}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Salary</label>

                        <input type="number"
                               name="salary"
                               value="{{employee.salary}}"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary">

                        Update Employee

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
