<!DOCTYPE html>
<html>

<head>

    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">

            Cloud RDS System

        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-outline-light">

                Dashboard

            </a>

            <a href="/employees"
               class="btn btn-outline-light">

                Employees

            </a>

            <a href="/reports"
               class="btn btn-outline-light">

                Reports

            </a>

            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-4">

                <h2 class="mb-4">

                    Add Employee

                </h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category,message in messages %}
                            <div class="alert alert-{{category}}">
                                {{message}}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="/save"
                      method="POST">

                    <div class="mb-3">

                        <label>Name</label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Department</label>

                        <input type="text"
                               name="department"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Salary</label>

                        <input type="number"
                               name="salary"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-success">

                        Save Employee

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
