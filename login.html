<!DOCTYPE html>
<html>

<head>

    <title>Cloud RDS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow mt-5 p-4">

                <h2 class="text-center mb-4">

                    Cloud RDS Login

                </h2>

                {% with messages = get_flashed_messages(with_categories=true) %}

                    {% if messages %}

                        {% for category,message in messages %}

                            <div class="alert alert-{{category}}">

                                {{message}}

                            </div>

                        {% endfor %}

                    {% endif %}

                {% endwith %}

                <form action="/authenticate"
                      method="POST">

                    <div class="mb-3">

                        <label>

                            Username

                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>

                            Password

                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
